server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:4200"
              - "http://localhost:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # ── Public auth routes (no JWT required) ────────────────
        - id: user-service-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # ── Protected routes ─────────────────────────────────────
        - id: user-service-admin
          uri: http://localhost:8081
          predicates:
            - Path=/api/admin/users/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/wallets/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: wallet-service-admin
          uri: http://localhost:8082
          predicates:
            - Path=/api/admin/wallets/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: stokvel-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/stokvels/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: ledger-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/ledger/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: merchant-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/merchants/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: fraud-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/fraud/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: webhook-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/webhooks/**
          filters:
            - StripPrefix=0
            - AuthFilter

jwt:
  secret: safipay-super-secret-key-for-jwt-signing-must-be-256-bits-long

logging:
  level:
    com.safipay.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
