server:
  port: 8081

spring:
  application:
    name: user-service
  
  # PostgreSQL Configuration (active)
  datasource:
    url: jdbc:postgresql://postgres:5432/safipay_user
    driver-class-name: org.postgresql.Driver
    username: rethabile
    password: password123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Configuration (commented - keep for reference)
