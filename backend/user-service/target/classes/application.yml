  #     enabled: true
  #     path: /h2-console

jwt:
  secret: safipay-super-secret-key-for-jwt-signing-must-be-256-bits-long
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.safipay.user: DEBUG