<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar-container container">

    <!-- Logo -->
    <a class="logo" routerLink="/">
      <div class="logo-mark">SP</div>
      <span class="logo-text">Safi<em>Pay</em></span>
    </a>

    <!-- Desktop Nav Links -->
     
    <ul class="nav-links" [class.active]="menuOpen()">
      <li><a (click)="scrollTo('features')">Features</a></li>
      <li><a (click)="scrollTo('how-it-works')">How It Works</a></li>
      <li><a (click)="scrollTo('testimonials')">Testimonials</a></li>
      <li><a (click)="scrollTo('faq')">FAQ</a></li>

      @if (authService.isLoggedIn()) {
        <li>
          <a routerLink="/dashboard" class="nav-login" (click)="closeMenu()">Dashboard</a>
        </li>
        <li>
          <button class="btn btn-ghost btn-outline" (click)="logout()">Logout</button>
        </li>
      } @else {
        <li>
          <a routerLink="/auth/login" class="nav-login" (click)="closeMenu()">Login</a>
        </li>
        <li>
          <a routerLink="/auth/register" class="btn btn-primary btn-outline" (click)="closeMenu()">
            Get Started
          </a>
        </li>
      }
    </ul>

    <!-- Mobile Toggle -->
    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
      <span [style.transform]="menuOpen() ? 'rotate(45deg) translate(5px,5px)' : 'none'"></span>
      <span [style.opacity]="menuOpen() ? '0' : '1'"></span>
      <span [style.transform]="menuOpen() ? 'rotate(-45deg) translate(5px,-5px)' : 'none'"></span>
    </button>
  </div>
</nav>
